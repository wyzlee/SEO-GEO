name: test

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: typecheck / lint / unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Lint (ESLint)
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm run test:coverage
        env:
          # Les tests ne frappent aucune infra réelle (DB/Stack/Stripe sont
          # mockés). Des valeurs fictives suffisent pour que les imports
          # passent sans throw.
          NODE_ENV: test
          DATABASE_URL: 'postgres://test:test@localhost/test'
          NEXT_PUBLIC_STACK_PROJECT_ID: '53bd9627-69d7-485c-a76e-260275e0de0f'
          NEXT_PUBLIC_STACK_PUBLISHABLE_KEY: 'pck_test_dummy'
          STACK_SECRET_SERVER_KEY: 'ssk_test_dummy'
          STACK_WEBHOOK_SECRET: 'test-webhook-secret-minimum-16-chars'
          CRON_SECRET: 'test-cron-secret-minimum-32-chars-for-validation'
          STRIPE_SECRET_KEY: 'sk_test_dummy'
          STRIPE_WEBHOOK_SECRET: 'whsec_dummy'

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  build:
    name: next build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build Next.js (dummy env)
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: 'postgres://test:test@localhost/test'
          NEXT_PUBLIC_STACK_PROJECT_ID: '53bd9627-69d7-485c-a76e-260275e0de0f'
          NEXT_PUBLIC_STACK_PUBLISHABLE_KEY: 'pck_test_dummy'
          STACK_SECRET_SERVER_KEY: 'ssk_test_dummy'
          STACK_WEBHOOK_SECRET: 'test-webhook-secret-minimum-16-chars'
          CRON_SECRET: 'test-cron-secret-minimum-32-chars-for-validation'
          STRIPE_SECRET_KEY: 'sk_test_dummy'
          STRIPE_WEBHOOK_SECRET: 'whsec_dummy'
          STRIPE_PRICE_STUDIO_MONTHLY: 'price_dummy'
          STRIPE_PRICE_AGENCY_MONTHLY: 'price_dummy'
